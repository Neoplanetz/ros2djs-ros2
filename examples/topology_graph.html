<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>/topology_graph MarkerArray Demo</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; color: #222; margin: 16px; }
  #stage { background: #ddd; border: 1px solid #888; display: inline-block; }
  #stage canvas { display: block; cursor: grab; }
  #stage canvas:active { cursor: grabbing; }
  #status { font-family: monospace; padding: 6px; background: #eee; border: 1px solid #ccc; margin-top: 8px; }
  .hint { color: #555; font-size: 12px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/easeljs@1/lib/easeljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<script src="../build/ros2d.min.js"></script>

<script>
  function init() {
    // Connect to rosbridge on the same host that served this page.
    var wsHost = window.location.hostname || 'localhost';
    var wsUrl = 'ws://' + wsHost + ':9090';
    document.getElementById('wsurl').textContent = wsUrl;

    var ros = new ROSLIB.Ros({ url: wsUrl });
    ros.on('connection', function () { setStatus('connected to ' + wsUrl); });
    ros.on('error',      function (e) { setStatus('error: ' + (e && e.message || e)); });
    ros.on('close',      function ()  { setStatus('connection closed'); });

    var viewer = new ROS2D.Viewer({
      divID: 'stage',
      width: 900,
      height: 600,
      background: '#dddddd'
    });

    // Initial fit; user can pan/zoom with mouse.
    viewer.scaleToDimensions(20, 14);
    viewer.shift(-2, -2);

    // Reference origin axis.
    viewer.scene.addChild(new ROS2D.Axis({ size: 1 }));

    // Mouse interactions: PanView/ZoomView only expose helper methods —
    // we wire up the actual DOM/EaselJS events here.
    var panView = new ROS2D.PanView({ rootObject: viewer.scene });
    var zoomView = new ROS2D.ZoomView({ rootObject: viewer.scene });
    var stage = viewer.scene;
    var canvas = document.querySelector('#stage canvas');

    var dragging = false;
    stage.addEventListener('stagemousedown', function (e) {
      dragging = true;
      panView.startPan(e.stageX, e.stageY);
    });
    stage.addEventListener('stagemousemove', function (e) {
      if (dragging) { panView.pan(e.stageX, e.stageY); }
    });
    stage.addEventListener('stagemouseup', function () { dragging = false; });
    // Catch mouseup outside the canvas too.
    window.addEventListener('mouseup', function () { dragging = false; });

    canvas.addEventListener('wheel', function (e) {
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var cx = e.clientX - rect.left;
      var cy = e.clientY - rect.top;
      zoomView.startZoom(cx, cy);
      // wheel up (negative deltaY) zooms in; tweak factor for sensitivity.
      var factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomView.zoom(factor);
    }, { passive: false });

    var client = new ROS2D.MarkerArrayClient({
      ros: ros,
      topic: '/topology_graph',
      rootObject: viewer.scene
    });

    var msgCount = 0;
    client.on('change', function () {
      msgCount++;
      var live = Object.keys(client.markers).length;
      setStatus('connected · messages: ' + msgCount + ' · live markers: ' + live);
    });
  }

  function setStatus(s) { document.getElementById('status').textContent = s; }
</script>
</head>

<body onload="init()">
  <h1>/topology_graph MarkerArray</h1>
  <p class="hint">
    rosbridge: <code id="wsurl">…</code> ·
    Drag to pan, scroll to zoom.
  </p>
  <div id="stage"></div>
  <div id="status">initializing…</div>
</body>
</html>
